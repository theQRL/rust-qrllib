# zizmor configuration for rust-qrllib
#
# zizmor (https://docs.zizmor.sh) is a static-analysis linter for GitHub
# Actions workflow files. We run it as a CI gate
# (.github/workflows/actionlint.yml) in --persona=pedantic mode at all
# severities — any new finding zizmor knows about, of any severity, fails
# the build. The configuration below records the deliberate exceptions.
#
# Adding new exceptions to this file should be rare and well-justified;
# the default is to fix the underlying finding in the workflow rather
# than suppress it here.

rules:
  superfluous-actions:
    # `dtolnay/rust-toolchain` is the de facto standard for installing a
    # specific Rust toolchain in CI; the alternative (`rustup` in a script
    # step) is brittle in practice (cache integration, target-add,
    # component-add). The action is well-maintained and SHA-pinned. Same
    # call for `Swatinem/rust-cache` and `jetli/wasm-pack-action` —
    # they layer non-trivial behaviour on top of what the runner ships.
    ignore:
      - actionlint.yml
      - acvp.yml
      - cross-verify.yml
      - lint.yml
      - pages.yml
      - release.yml
      - security.yml
      - test.yml
      - wycheproof.yml
