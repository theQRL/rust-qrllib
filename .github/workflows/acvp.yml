name: NIST ACVP Test Vectors

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mldsa87-acvp:
    name: ML-DSA-87 ACVP Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.95.0

      - name: Clone NIST ACVP-Server (ML-DSA vectors)
        env:
          ACVP_REF: 15c0f3deeefbfa8cb6cd32a99e1ca3b738c66bf0 # v1.1.0.42
        run: |
          git init /tmp/acvp-server
          cd /tmp/acvp-server
          git remote add origin https://github.com/usnistgov/ACVP-Server.git
          git sparse-checkout init --cone
          git sparse-checkout set \
            gen-val/json-files/ML-DSA-keyGen-FIPS204 \
            gen-val/json-files/ML-DSA-sigGen-FIPS204
          git fetch --depth 1 --filter=blob:none origin "$ACVP_REF"
          git checkout "$ACVP_REF"
          echo "ACVP-Server commit: $(git rev-parse --short HEAD)"
          echo "ACVP-Server date: $(git log -1 --format=%ci)"
          ls gen-val/json-files/ML-DSA-keyGen-FIPS204/prompt.json

      - name: Extract and merge test vectors
        run: |
          python3 .github/acvp/merge_vectors.py \
            --keygen-prompt /tmp/acvp-server/gen-val/json-files/ML-DSA-keyGen-FIPS204/prompt.json \
            --keygen-results /tmp/acvp-server/gen-val/json-files/ML-DSA-keyGen-FIPS204/expectedResults.json \
            --siggen-prompt /tmp/acvp-server/gen-val/json-files/ML-DSA-sigGen-FIPS204/prompt.json \
            --siggen-results /tmp/acvp-server/gen-val/json-files/ML-DSA-sigGen-FIPS204/expectedResults.json \
            --parameter-set ML-DSA-87 \
            --output-dir /tmp/acvp-vectors
          echo "=== Generated vector files ==="
          ls -la /tmp/acvp-vectors/
          echo ""
          echo "Keygen vectors:"
          python3 -c "import json; d=json.load(open('/tmp/acvp-vectors/keygen.json')); print(f'  {len(d)} test cases')"
          echo "SigGen vectors:"
          python3 -c "import json; d=json.load(open('/tmp/acvp-vectors/siggen.json')); print(f'  {len(d)} test cases')"

      - name: Run ACVP tests
        env:
          ACVP_VECTORS_DIR: /tmp/acvp-vectors
        run: |
          cargo test --locked --test acvp_mldsa -- --nocapture

  mlkem1024-acvp:
    name: ML-KEM-1024 ACVP Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.95.0

      - name: Clone NIST ACVP-Server (ML-KEM vectors)
        env:
          ACVP_REF: 15c0f3deeefbfa8cb6cd32a99e1ca3b738c66bf0 # v1.1.0.42
        run: |
          git init /tmp/acvp-server
          cd /tmp/acvp-server
          git remote add origin https://github.com/usnistgov/ACVP-Server.git
          git sparse-checkout init --cone
          git sparse-checkout set \
            gen-val/json-files/ML-KEM-keyGen-FIPS203 \
            gen-val/json-files/ML-KEM-encapDecap-FIPS203
          git fetch --depth 1 --filter=blob:none origin "$ACVP_REF"
          git checkout "$ACVP_REF"
          echo "ACVP-Server commit: $(git rev-parse --short HEAD)"
          echo "ACVP-Server date: $(git log -1 --format=%ci)"
          ls gen-val/json-files/ML-KEM-keyGen-FIPS203/prompt.json
          ls gen-val/json-files/ML-KEM-encapDecap-FIPS203/prompt.json

      - name: Run ACVP tests
        # The ML-KEM ACVP tests read the raw NIST prompt/expectedResults format
        # directly (no merge step), so point MLKEM_ACVP_VECTORS_DIR at the
        # directory holding the two suite subfolders. They live in-crate as lib
        # unit tests (the decapsulation cases need the expanded-key form), so
        # filter to the `acvp::` module.
        env:
          MLKEM_ACVP_VECTORS_DIR: /tmp/acvp-server/gen-val/json-files
        run: |
          cargo test --locked --package qrllib --lib 'acvp::' -- --nocapture
