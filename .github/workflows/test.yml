name: Test

on: [push, pull_request]

permissions:
  contents: read


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workspace-tests:
    name: Workspace Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.95.0
          components: llvm-tools-preview
          targets: wasm32-unknown-unknown

      - name: Cache Rust
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Run workspace tests
        run: cargo test --workspace --locked

      - name: Run exhaustive metamorphic invariant sweep
        # Port of the ToB-handoff `metamorphic_test.go` exhaustive
        # bit-by-bit tests. Slow (~12s in release mode); gated behind
        # `METAMORPHIC_EXHAUSTIVE=1` so day-to-day `cargo test` skips
        # the iteration loops. Run in release mode here for the speed
        # difference. See `crates/qrllib/tests/metamorphic_exhaustive.rs`
        # for the property contracts.
        timeout-minutes: 10
        env:
          METAMORPHIC_EXHAUSTIVE: '1'
        run: cargo test --release --locked --package qrllib --test metamorphic_exhaustive

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.95.0
          components: llvm-tools-preview

      - name: Cache Rust
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --version 0.8.5 --locked

      - name: Generate coverage report
        run: cargo llvm-cov --locked --package qrllib --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        if: github.repository == 'theqrl/rust-qrllib' || github.repository == 'theQRL/rust-qrllib'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./lcov.info
          flags: rust-qrllib
          fail_ci_if_error: true

  demo-build:
    name: Demo Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.95.0
          targets: wasm32-unknown-unknown

      - name: Cache Rust
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Setup wasm-pack
        uses: jetli/wasm-pack-action@0d096b08b4e5a7de8c28de67e11e945404e9eefa # v0.4.0
        with:
          version: v0.14.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24.13.0'
          cache: npm
          cache-dependency-path: demo/package-lock.json

      - name: Install demo dependencies
        working-directory: demo
        run: npm ci

      - name: Build demo
        working-directory: demo
        run: npm run build
