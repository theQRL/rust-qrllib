name: Cross-Implementation Verification

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: read


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dilithium-cross-verify:
    name: Dilithium (Round 3) Cross-Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.95.0

      - name: Clone pq-crystals Dilithium (Round 3)
        run: |
          git clone https://github.com/pq-crystals/dilithium.git /tmp/dilithium-ref
          cd /tmp/dilithium-ref
          git checkout ac743d5  # Round 3 (pre-FIPS)
          echo "Reference commit: $(git rev-parse --short HEAD)"

      - name: Generate rust-qrllib Dilithium signature
        run: cargo run --locked --quiet -p qrllib --example dilithium_sign

      - name: Compile reference verifier
        run: |
          cd /tmp/dilithium-ref/ref
          gcc -o /tmp/verify_dilithium -DDILITHIUM_MODE=5 \
            "$GITHUB_WORKSPACE/.github/cross-verify/dilithium_verify_ref.c" \
            sign.c packing.c polyvec.c poly.c ntt.c reduce.c \
            rounding.c symmetric-shake.c fips202.c randombytes.c -I. -O2

      - name: Verify rust-qrllib signature with reference
        run: |
          echo "=== Verifying rust-qrllib signature with pq-crystals reference ==="
          /tmp/verify_dilithium
          echo "✓ rust-qrllib → pq-crystals: PASSED"

      - name: Generate reference signature
        run: |
          cd /tmp/dilithium-ref/ref
          gcc -o /tmp/sign_dilithium_ref -DDILITHIUM_MODE=5 \
            "$GITHUB_WORKSPACE/.github/cross-verify/dilithium_sign_ref.c" \
            sign.c packing.c polyvec.c poly.c ntt.c reduce.c \
            rounding.c symmetric-shake.c fips202.c randombytes.c -I. -O2
          /tmp/sign_dilithium_ref

      - name: Verify reference signature with rust-qrllib
        run: |
          echo "=== Verifying pq-crystals signature with rust-qrllib ==="
          cargo run --locked --quiet -p qrllib --example dilithium_verify
          echo "✓ pq-crystals → rust-qrllib: PASSED"

  mldsa87-cross-verify:
    name: ML-DSA-87 (FIPS 204) Cross-Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.95.0

      - name: Clone pq-crystals Dilithium (FIPS 204)
        run: |
          git clone --depth 1 https://github.com/pq-crystals/dilithium.git /tmp/mldsa-ref
          cd /tmp/mldsa-ref
          echo "Reference commit: $(git rev-parse --short HEAD)"

      - name: Generate rust-qrllib ML-DSA-87 signature
        run: cargo run --locked --quiet -p qrllib --example mldsa87_sign

      - name: Compile reference verifier
        run: |
          cd /tmp/mldsa-ref/ref
          gcc -o /tmp/verify_mldsa -DDILITHIUM_MODE=5 \
            "$GITHUB_WORKSPACE/.github/cross-verify/mldsa87_verify_ref.c" \
            sign.c packing.c polyvec.c poly.c ntt.c reduce.c \
            rounding.c symmetric-shake.c fips202.c randombytes.c -I. -O2

      - name: Verify rust-qrllib signature with reference
        run: |
          echo "=== Verifying rust-qrllib ML-DSA-87 signature with pq-crystals reference ==="
          /tmp/verify_mldsa
          echo "✓ rust-qrllib → pq-crystals: PASSED"

      - name: Generate reference signature
        run: |
          cd /tmp/mldsa-ref/ref
          gcc -o /tmp/sign_mldsa_ref -DDILITHIUM_MODE=5 \
            "$GITHUB_WORKSPACE/.github/cross-verify/mldsa87_sign_ref.c" \
            sign.c packing.c polyvec.c poly.c ntt.c reduce.c \
            rounding.c symmetric-shake.c fips202.c randombytes.c -I. -O2
          /tmp/sign_mldsa_ref

      - name: Verify reference signature with rust-qrllib
        run: |
          echo "=== Verifying pq-crystals ML-DSA-87 signature with rust-qrllib ==="
          cargo run --locked --quiet -p qrllib --example mldsa87_verify
          echo "✓ pq-crystals → rust-qrllib: PASSED"

  sphincs-cross-verify:
    name: SPHINCS+ (SHAKE-256s-robust) Cross-Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.95.0

      - name: Clone SPHINCS+ reference (consistent-basew branch)
        run: |
          git clone --branch consistent-basew https://github.com/sphincs/sphincsplus.git /tmp/sphincs-ref
          cd /tmp/sphincs-ref
          echo "Reference branch: consistent-basew"
          echo "Reference commit: $(git rev-parse --short HEAD)"

      - name: Generate rust-qrllib SPHINCS+ signature
        run: cargo run --locked --quiet -p qrllib --example sphincs_sign

      - name: Compile reference verifier
        run: |
          cd /tmp/sphincs-ref/ref
          gcc -o /tmp/verify_sphincs \
            -DPARAMS=sphincs-shake-256s -DTHASH=robust \
            "$GITHUB_WORKSPACE/.github/cross-verify/sphincs_verify_ref.c" \
            address.c merkle.c wots.c wotsx1.c utils.c utilsx1.c \
            fors.c sign.c hash_shake.c thash_shake_robust.c fips202.c \
            randombytes.c -I. -O2

      - name: Verify rust-qrllib signature with reference
        run: |
          echo "=== Verifying rust-qrllib SPHINCS+ signature with reference ==="
          /tmp/verify_sphincs
          echo "✓ rust-qrllib → reference: PASSED"

      - name: Generate reference signature
        run: |
          cd /tmp/sphincs-ref/ref
          gcc -o /tmp/sign_sphincs_ref \
            -DPARAMS=sphincs-shake-256s -DTHASH=robust \
            "$GITHUB_WORKSPACE/.github/cross-verify/sphincs_sign_ref.c" \
            address.c merkle.c wots.c wotsx1.c utils.c utilsx1.c \
            fors.c sign.c hash_shake.c thash_shake_robust.c fips202.c \
            randombytes.c -I. -O2
          /tmp/sign_sphincs_ref

      - name: Verify reference signature with rust-qrllib
        run: |
          echo "=== Verifying reference SPHINCS+ signature with rust-qrllib ==="
          cargo run --locked --quiet -p qrllib --example sphincs_verify
          echo "✓ reference → rust-qrllib: PASSED"

  xmss-cross-verify:
    name: XMSS (SHA2_10_256) Cross-Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.95.0

      - name: Clone XMSS reference (pinned to original RFC 8391 spec)
        run: |
          # QRL's XMSS implementation predates RFC 8391 and is retained
          # as a v1 → v2 migration shim. Pinning to commit 7793c40
          # (2020-04-14) — the last revision on the original RFC 8391
          # expand_seed construction, before SP 800-208's later
          # refinement landed in commit 3e28db2 — keeps cross-verify
          # aligned with the construction QRL actually targets.
          # See ../cross-verify/README.md "XMSS" section and SECURITY.md
          # "Standards alignment" for the rationale.
          git clone https://github.com/XMSS/xmss-reference.git /tmp/xmss-ref
          cd /tmp/xmss-ref
          git checkout 7793c40
          echo "Reference commit: $(git rev-parse --short HEAD)"

      - name: Generate rust-qrllib XMSS signature
        run: cargo run --locked --quiet -p qrllib --example xmss_sign

      - name: Compile reference verifier
        run: |
          cd /tmp/xmss-ref
          gcc -o /tmp/verify_xmss -Wall -O2 -I. \
            "$GITHUB_WORKSPACE/.github/cross-verify/xmss_verify_ref.c" \
            params.c hash.c fips202.c hash_address.c randombytes.c wots.c \
            xmss.c xmss_core.c xmss_commons.c utils.c -lcrypto

      - name: Verify rust-qrllib signature with reference (forward direction)
        run: |
          echo "=== Forward: rust-qrllib signs, reference verifies ==="
          /tmp/verify_xmss
          echo "✓ rust-qrllib → reference: PASSED"

      - name: Compile reference signer (reverse direction)
        run: |
          cd /tmp/xmss-ref
          # NOTE: randombytes.c is intentionally omitted here.
          # xmss_sign_ref.c provides its own deterministic randombytes()
          # so the reference's xmssmt_core_keypair (which has no public
          # seeded-keypair API at this commit pin) consumes a fixed
          # 96-byte buffer. Linking randombytes.c too would duplicate
          # the symbol.
          gcc -o /tmp/sign_xmss_ref -Wall -O2 -I. \
            "$GITHUB_WORKSPACE/.github/cross-verify/xmss_sign_ref.c" \
            params.c hash.c fips202.c hash_address.c wots.c \
            xmss.c xmss_core.c xmss_commons.c utils.c -lcrypto

      - name: Generate reference XMSS signature with seeded keypair
        run: /tmp/sign_xmss_ref

      - name: Verify reference signature with rust-qrllib (reverse direction)
        run: |
          echo "=== Reverse: reference signs, rust-qrllib verifies via rfc8391 module ==="
          cargo run --locked --quiet --example xmss_verify_reverse
          echo "✓ reference → rust-qrllib: PASSED"
          echo ""
          echo "Both directions verified."
