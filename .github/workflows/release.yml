name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

# Default deny — each job below opts in to the exact permissions it needs
# rather than inheriting a workflow-wide blanket.
permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-pr:
    name: Release PR
    runs-on: ubuntu-latest
    if: (github.repository == 'theqrl/rust-qrllib' || github.repository == 'theQRL/rust-qrllib') && vars.RELEASE_ENABLED == 'true'
    permissions:
      contents: write       # release-plz commits version bumps and updated CHANGELOG.md to the release branch
      pull-requests: write  # release-plz opens the release PR
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ secrets.RELEASE_PLZ_TOKEN != '' && secrets.RELEASE_PLZ_TOKEN || github.token }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.95.0

      - name: Cache Rust
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Update release PR
        uses: release-plz/action@ef08e716ba77de37dd17b19d72ed171a2e1b63ab # v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN != '' && secrets.RELEASE_PLZ_TOKEN || github.token }}

  release:
    name: Release
    runs-on: ubuntu-latest
    if: (github.repository == 'theqrl/rust-qrllib' || github.repository == 'theQRL/rust-qrllib') && vars.RELEASE_ENABLED == 'true'
    environment: crates-publish
    permissions:
      contents: write       # release-plz creates the git tag + GitHub release
      pull-requests: read   # release-plz reads PR labels to decide release notes
      id-token: write       # crates.io trusted publishing (OIDC)
    outputs:
      releases_created: ${{ steps.release-plz.outputs.releases_created }}
      releases: ${{ steps.release-plz.outputs.releases }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ secrets.RELEASE_PLZ_TOKEN != '' && secrets.RELEASE_PLZ_TOKEN || github.token }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.95.0

      - name: Cache Rust
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Authenticate to crates.io (OIDC)
        id: crates-auth
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5

      - name: Run release-plz
        id: release-plz
        uses: release-plz/action@ef08e716ba77de37dd17b19d72ed171a2e1b63ab # v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN != '' && secrets.RELEASE_PLZ_TOKEN || github.token }}
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-auth.outputs.token }}

  # Generate checksums, SBOM, and attestations for the release
  supply-chain-security:
    name: Supply Chain Security Artifacts
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.releases_created == 'true'
    permissions:
      contents: write       # upload signed artefacts (checksums, SBOM) to the GitHub release
      id-token: write       # mint Sigstore OIDC tokens for keyless signing
      attestations: write   # write SLSA / SBOM attestations to the repo's attestation store
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          fetch-depth: 0

      # Generate checksums for source files
      - name: Generate checksums
        run: |
          mkdir -p dist
          sha256sum Cargo.toml Cargo.lock deny.toml release-plz.toml LICENSE > dist/checksums-sha256.txt
          sha512sum Cargo.toml Cargo.lock deny.toml release-plz.toml LICENSE > dist/checksums-sha512.txt
          git ls-files -z | xargs -0 sha256sum > dist/source-checksums-sha256.txt

      # Generate SBOM using Syft
      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          format: spdx-json
          output-file: dist/sbom-spdx.json
          artifact-name: sbom-spdx.json

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          format: cyclonedx-json
          output-file: dist/sbom-cyclonedx.json
          artifact-name: sbom-cyclonedx.json

      # Attest checksums with GitHub attestations (Sigstore-backed)
      - name: Attest checksums
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-path: |
            dist/checksums-sha256.txt
            dist/checksums-sha512.txt

      # Attest SBOM files
      - name: Attest SBOM (SPDX)
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4
        with:
          subject-path: dist/sbom-spdx.json
          sbom-path: dist/sbom-spdx.json

      - name: Attest SBOM (CycloneDX)
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4
        with:
          subject-path: dist/sbom-cyclonedx.json
          sbom-path: dist/sbom-cyclonedx.json

      # Attest the workspace manifests and release policy files directly.
      - name: Attest module files
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-path: |
            Cargo.toml
            Cargo.lock
            deny.toml
            release-plz.toml

      # Upload artifacts to the release
      - name: Upload release artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASES: ${{ needs.release.outputs.releases }}
        run: |
          set -euo pipefail
          for release in $(echo "$RELEASES" | jq -r -c '.[]'); do
            tag=$(echo "$release" | jq -r '.tag')
            gh release upload "$tag" \
              dist/checksums-sha256.txt \
              dist/checksums-sha512.txt \
              dist/source-checksums-sha256.txt \
              dist/sbom-spdx.json \
              dist/sbom-cyclonedx.json \
              --clobber
          done

  # Compute subjects for SLSA provenance
  compute-subjects:
    name: Compute SLSA Subjects
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.releases_created == 'true'
    permissions:
      contents: read
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Generate subject hashes
        id: hash
        run: |
          # Compute SHA256 hashes of the workspace manifests and release policy files.
          set -euo pipefail
          echo "hashes=$(sha256sum Cargo.toml Cargo.lock deny.toml release-plz.toml | base64 -w0)" >> "$GITHUB_OUTPUT"

  # Generate SLSA provenance (Level 3)
  provenance:
    name: SLSA Provenance
    needs: [release, compute-subjects]
    if: needs.release.outputs.releases_created == 'true'
    permissions:
      actions: read         # required by slsa-github-generator to read this workflow run's metadata
      id-token: write       # required by slsa-github-generator to mint the SLSA provenance OIDC token
      contents: write       # required by slsa-github-generator to upload the provenance file to the release
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.compute-subjects.outputs.hashes }}
      upload-assets: true
      upload-tag-name: ${{ fromJSON(needs.release.outputs.releases)[0].tag }}
      provenance-name: provenance.intoto.jsonl

  publish-wasm:
    name: Publish qrllib-wasm to npm
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.releases_created == 'true'
    environment: npm-publish
    permissions:
      contents: read
      id-token: write       # npm trusted-publishing OIDC token + provenance signing
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.95.0
          targets: wasm32-unknown-unknown

      - name: Cache Rust
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Setup wasm-pack
        uses: jetli/wasm-pack-action@0d096b08b4e5a7de8c28de67e11e945404e9eefa # v0.4.0
        with:
          version: v0.14.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24.13.0'

      - name: Use npm for trusted publishing
        run: npm install -g npm@11.5.1

      - name: Build wasm package
        run: wasm-pack build crates/qrllib-wasm --target web --scope theqrl --out-dir pkg

      - name: Set package version to the release version
        working-directory: crates/qrllib-wasm/pkg
        env:
          RELEASES: ${{ needs.release.outputs.releases }}
        run: |
          version=$(echo "$RELEASES" | jq -r '.[0].version // (.[0].tag | sub("^[^0-9]*";""))')
          npm pkg set version="$version"

      - name: Publish to npm (trusted publishing + provenance)
        working-directory: crates/qrllib-wasm/pkg
        run: npm publish --access public --provenance
